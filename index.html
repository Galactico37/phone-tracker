/* ===== view_compare.js ===== */
/* ============================================================
   COMPARISON — side-by-side matrix with winner highlighting,
   history overlay, and export (print / copy / CSV)
   ============================================================ */
function viewCompare(el){
  const models=State.tray.map(k=>modelByKey(k)).filter(Boolean);
  if(models.length<2){
    el.innerHTML='<div class="view"><div class="empty-state">'+svg(I.compare)+
      '<div class="es-t">Add 2–6 models to compare</div>'+
      '<div>Tick “Compare” on any card or table row, then come back here. '+
      (State.tray.length===1?'You have 1 model selected — add at least one more.':'')+'</div>'+
      '<button class="btn btn-primary" style="margin-top:18px" onclick="go(\'browse\')">'+svg(I.browse)+'Browse models</button>'+
      '</div></div>';
    return;
  }

  // ---- build comparable rows with winner logic ----
  // each: {label, get(m)->display, num(m)->number|null, better:'min'|'max'|null}
  const siteRows=(State.data?State.data.sites:[]).map(sk=>({
    label:'At '+(SITE_META[sk]?SITE_META[sk].label:sk),
    disp:m=>m.siteLow[sk]!=null?fmtPrice(m.siteLow[sk]):null,
    val:m=>m.siteLow[sk]!=null?m.siteLow[sk]:null, better:'min'
  }));
  const rowsDef=[
    {label:'Lowest price', disp:m=>fmtPrice(m.lowest), val:m=>m.lowest, better:'min'},
    ...siteRows,
    {label:'Price spread', disp:m=>m.highest>m.lowest?fmtPrice(m.highest-m.lowest):null, val:m=>m.highest-m.lowest, better:'min'},
    {label:'RAM options', disp:m=>{const r=[...new Set(m.variants.map(v=>v.ram).filter(Boolean))].sort((a,b)=>a-b);return r.length?r.join(' / ')+' GB':null;}, val:m=>{const r=m.variants.map(v=>v.ram).filter(Boolean);return r.length?Math.max(...r):null;}, better:'max'},
    {label:'Storage options', disp:m=>{const r=[...new Set(m.variants.map(v=>v.storage).filter(Boolean))].sort((a,b)=>a-b);return r.length?r.map(x=>x>=1024?(x/1024)+'TB':x+'GB').join(' / '):null;}, val:m=>{const r=m.variants.map(v=>v.storage).filter(Boolean);return r.length?Math.max(...r):null;}, better:'max'},
    {label:'Listings', disp:m=>String(m.listingCount), val:m=>m.listingCount, better:'max'},
    {label:'Available at', disp:m=>m.siteList.map(s=>SITE_META[s]?SITE_META[s].label:s).join(', '), val:m=>m.siteList.length, better:'max'},
    {label:'Discount', disp:m=>m.discount>0?'−'+m.discount+'% (save '+fmtPrice(m.saving)+')':null, val:m=>m.discount, better:'max'},
    {label:'Δ since last scrape', disp:m=>{const d=modelDelta(m.mkey,m.lowest);return d&&d.diff!==0?((d.diff<0?'−':'+')+fmtPrice(Math.abs(d.diff),{bare:true})+' ('+(d.pct>0?'+':'')+d.pct.toFixed(1)+'%)'):null;}, val:m=>{const d=modelDelta(m.mkey,m.lowest);return d?d.diff:null;}, better:'min'},
  ];

  function winners(rd){
    if(!rd.better) return new Set();
    const vals=models.map(rd.val);
    const valid=vals.filter(v=>v!=null);
    if(valid.length<2) return new Set();
    const best=rd.better==='min'?Math.min(...valid):Math.max(...valid);
    const w=new Set();
    vals.forEach((v,i)=>{ if(v!=null&&v===best) w.add(i); });
    // only highlight if there's an actual distinction
    if(w.size===models.length) return new Set();
    return w;
  }

  // ---- header ----
  let head='<thead><tr><th class="rowlbl"></th>'+models.map(m=>
    '<th><div class="cmp-mhead">'+monoTile(m.brand)+
    '<div><div class="card-brand">'+esc(m.brand)+'</div><div style="font-weight:700;font-size:14px;font-family:var(--font-head)">'+esc(m.cleanModel)+'</div></div>'+
    '<div class="num" style="font-weight:700;font-size:15px">'+fmtPrice(m.lowest)+'</div>'+
    '<button class="btn btn-ghost btn-sm" onclick="toggleTray(\''+esc(m.mkey)+'\')">'+svg(I.x)+'Remove</button>'+
    '</div></th>').join('')+'</tr></thead>';

  // ---- body ----
  let body='<tbody>'+rowsDef.map(rd=>{
    const w=winners(rd);
    return '<tr><td class="rowlbl">'+rd.label+'</td>'+models.map((m,i)=>{
      const d=rd.disp(m);
      const isWin=w.has(i);
      return '<td class="'+(isWin?'win':'')+(d==null?' missing':'')+'">'+(d==null?'—':esc(d))+
        (isWin?' <span class="cmp-win-tag">'+svg(I.check)+'best</span>':'')+'</td>';
    }).join('')+'</tr>';
  }).join('')+'</tbody>';

  let html='<div class="view">';
  html+='<div class="sec-head"><div class="st"><h2>Comparing '+models.length+' models</h2>'+
    '<p>Winners highlighted per row. Prices are the lowest live listing per retailer.</p></div>'+
    '<button class="btn btn-ghost btn-sm" onclick="copyCompare()">'+svg(I.copy)+'Copy as table</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="exportCompareCSV()">'+svg(I.download)+'CSV</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="window.print()">'+svg(I.print)+'Print / PDF</button>'+
    '<button class="btn btn-danger btn-sm" onclick="clearTray()">'+svg(I.trash)+'Clear</button></div>';

  // history overlay
  if(hasHistory()){
    const anyTl=models.some(m=>modelTimeline(m.mkey).length>=2);
    if(anyTl) html+='<div class="chart-wrap" style="margin-bottom:16px"><div class="sec-head mb0" style="margin-bottom:12px">'+
      '<div class="st"><h3>Price history — overlaid</h3><p>Lowest price over time, from your scheduled scrapes</p></div></div>'+
      '<div class="chart-canvas-h tall"><canvas id="cmpHistChart"></canvas></div></div>';
  } else {
    html+='<div class="hint">'+svg(I.history)+'These models\' price trends will overlay here once the History sheet holds two or more scrape dates.</div>';
  }

  html+='<div class="tbl-wrap panel-pad0"><div class="cmp-scroll"><table class="cmp">'+head+body+'</table></div></div>';
  html+='</div>';
  el.innerHTML=html;

  // draw overlay chart
  if(hasHistory()){
    const c=document.getElementById('cmpHistChart');
    if(c){
      const B=chartBase();
      // union of all dates
      const allDates=[...new Set(loadHistory().map(s=>s.date))].sort();
      const palette=['#5b8cff','#ff7a59','#1fb573','#e8123c','#7b6cff','#00b8d9'];
      const datasets=models.map((m,i)=>{ const tl=modelTimeline(m.mkey); const byDate={}; tl.forEach(p=>byDate[p.date]=p.low);
        const col=brandColor(m.brand)[0]||palette[i%palette.length];
        return {label:m.brand+' '+m.cleanModel, data:allDates.map(d=>byDate[d]!=null?toDisplay(byDate[d]):null),
          borderColor:col, backgroundColor:hexA(col,.1), tension:.3, spanGaps:true, pointRadius:3, borderWidth:2.4}; });
      mkChart(c,{type:'line',data:{labels:allDates,datasets},
        options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
          plugins:{legend:{position:'bottom',labels:{color:B.label,usePointStyle:true,padding:14,font:{size:12}}},
            tooltip:{...B.tooltip,callbacks:{label:i=>i.dataset.label+': '+fmtPrice(i.raw/(State.settings.currency==='USD'?1:1))}}},
          scales:{x:{grid:{display:false},ticks:{color:B.ticks,font:{size:11}}},
                  y:{grid:{color:B.grid},ticks:{color:B.ticks,font:{size:11},callback:fmtAxis},border:{display:false}}}}});
    }
  }
}

/* ---- exports ---- */
function compareMatrix(){
  const models=State.tray.map(k=>modelByKey(k)).filter(Boolean);
  const fields=[['Brand',m=>m.brand],['Model',m=>m.cleanModel],['Lowest Price (LKR)',m=>m.lowest],
    ...(State.data?State.data.sites:[]).map(sk=>[(SITE_META[sk]?SITE_META[sk].label:sk)+' (LKR)',m=>m.siteLow[sk]!=null?m.siteLow[sk]:'']),
    ['RAM (GB)',m=>[...new Set(m.variants.map(v=>v.ram).filter(Boolean))].sort((a,b)=>a-b).join('/')],
    ['Storage (GB)',m=>[...new Set(m.variants.map(v=>v.storage).filter(Boolean))].sort((a,b)=>a-b).join('/')],
    ['Listings',m=>m.listingCount],
    ['Sites',m=>m.siteList.map(s=>SITE_META[s]?SITE_META[s].label:s).join(' ')],
    ['Discount %',m=>m.discount||0]];
  const header=['Spec',...models.map(m=>m.brand+' '+m.cleanModel)];
  const rows=fields.map(([lbl,fn])=>[lbl,...models.map(m=>{const v=fn(m);return v==null?'':v;})]);
  return {header,rows};
}
function copyCompare(){
  const {header,rows}=compareMatrix();
  const tsv=[header.join('\t'),...rows.map(r=>r.join('\t'))].join('\n');
  try{ navigator.clipboard.writeText(tsv); toast('Comparison copied to clipboard','ok'); }
  catch(e){ // fallback
    const ta=document.createElement('textarea'); ta.value=tsv; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');toast('Comparison copied','ok');}catch(_){toast('Copy failed','err');} ta.remove(); }
}
function exportCompareCSV(){
  const {header,rows}=compareMatrix();
  const esc2=v=>{ v=String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const csv=[header.map(esc2).join(','),...rows.map(r=>r.map(esc2).join(','))].join('\n');
  downloadBlob(csv,'text/csv','sl-phone-comparison.csv'); toast('CSV downloaded','ok');
}
function downloadBlob(content,type,filename){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}

        miniStat('High',fmtPrice(Math.max(...lows)))+'</div>'+
        '<div class="kpi-delta '+(chg<0?'down':chg>0?'up':'flat')+'" style="margin-top:10px">'+(chg>0?'+':'')+chg.toFixed(1)+'% over window</div>'+
        '</div>'; }).join('')+'</div>';

  el.innerHTML='<div class="view">'+mgmt+
    '<div class="browse-layout" style="grid-template-columns:300px 1fr">'+listHtml+'<div>'+chartPanel+stats+'</div></div></div>';
  drawPHChart();
}

function phListItems(models){
  return models.slice(0,200).map(m=>{ const on=State.phSelection.includes(m.mkey);
    return '<div class="ph-item'+(on?' on':'')+'" onclick="togglePH(\''+esc(m.mkey)+'\')">'+monoTile(m.brand)+
      '<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(m.cleanModel)+'</div>'+
      '<div class="muted small">'+esc(m.brand)+'</div></div>'+
      '<div class="num small" style="font-weight:600">'+fmtPrice(m.lowest,{abbr:true})+'</div></div>'; }).join('')
    || '<div class="empty-state" style="padding:20px"><div>No models match.</div></div>';
}
function renderPHList(){ const models=State.data.models.filter(m=>{const q=PH_SEARCH.toLowerCase();return !q||m.searchText.includes(q);})
  .filter(m=>modelTimeline(m.mkey).length>=1); const el=document.getElementById('phList'); if(el) el.innerHTML=phListItems(models); }
function togglePH(k){ const i=State.phSelection.indexOf(k); if(i>=0)State.phSelection.splice(i,1);
  else{ if(State.phSelection.length>=6){toast('Up to 6 models on the chart','warn');return;} State.phSelection.push(k);} render(); }

function drawPHChart(){
  const c=document.getElementById('phChart'); if(!c) return;
  const B=chartBase();
  const allDates=[...new Set(loadHistory().map(s=>s.date))].sort();
  let datasets;
  if(State.phSelection.length===1 && PH_SITELINES){
    const k=State.phSelection[0]; const m=modelByKey(k); const tl=modelTimeline(k);
    const sites=[...new Set(tl.flatMap(p=>Object.keys(p.sites||{})))];
    const siteColors={abans:'#ff7a59',singer:'#e8123c',singhagiri:'#1fb573',gnext:'#7b6cff'};
    datasets=sites.map(sk=>{ const byDate={}; tl.forEach(p=>{ if(p.sites&&p.sites[sk]!=null) byDate[p.date]=p.sites[sk]; });
      return {label:SITE_META[sk]?SITE_META[sk].label:sk, data:allDates.map(d=>byDate[d]!=null?toDisplay(byDate[d]):null),
        borderColor:siteColors[sk]||css('--accent'), backgroundColor:'transparent', tension:.3, spanGaps:true, pointRadius:3, borderWidth:2.4}; });
    // also overall lowest
    const byDateL={}; tl.forEach(p=>byDateL[p.date]=p.low);
    datasets.unshift({label:'Overall lowest', data:allDates.map(d=>byDateL[d]!=null?toDisplay(byDateL[d]):null),
      borderColor:css('--accent'), backgroundColor:hexA(css('--accent'),.1), fill:true, tension:.3, spanGaps:true, pointRadius:3, borderWidth:3});
  } else {
    const palette=['#5b8cff','#ff7a59','#1fb573','#e8123c','#7b6cff','#00b8d9'];
    datasets=State.phSelection.map((k,i)=>{ const m=modelByKey(k); const tl=modelTimeline(k); const byDate={}; tl.forEach(p=>byDate[p.date]=p.low);
      const col=(m?brandColor(m.brand)[0]:null)||palette[i%palette.length];
      return {label:m?(m.brand+' '+m.cleanModel):k, data:allDates.map(d=>byDate[d]!=null?toDisplay(byDate[d]):null),
        borderColor:col, backgroundColor:hexA(col,.1), tension:.3, spanGaps:true, pointRadius:3, borderWidth:2.4}; });
  }
  mkChart(c,{type:'line',data:{labels:allDates,datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{color:B.label,usePointStyle:true,padding:14,font:{size:12}}},
        tooltip:{...B.tooltip,callbacks:{label:i=>i.dataset.label+': '+(i.raw==null?'—':fmtPrice(i.raw/(State.settings.currency==='USD'?1:1)))}}},
      scales:{x:{grid:{display:false},ticks:{color:B.ticks,font:{size:11}}},
              y:{grid:{color:B.grid},ticks:{color:B.ticks,font:{size:11},callback:fmtAxis},border:{display:false}}}}});
}

function exportHistory(fmt){
  const h=loadHistory(); if(!h.length){ toast('Nothing to export','warn'); return; }
  if(fmt==='json'){ downloadBlob(JSON.stringify(h,null,2),'application/json','sl-phone-history.json'); }
  else{
    const lines=[['Date','Brand','Model','Lowest (LKR)','Abans','Singer','Singhagiri','gnext'].join(',')];
    h.forEach(s=>Object.entries(s.models).forEach(([k,v])=>{
      lines.push([s.date,(v.brand||'').replace(/,/g,' '),(v.model||'').replace(/,/g,' '),v.low,
        (v.sites&&v.sites.abans)||'',(v.sites&&v.sites.singer)||'',(v.sites&&v.sites.singhagiri)||'',(v.sites&&v.sites.gnext)||''].join(','));
    }));
    downloadBlob(lines.join('\n'),'text/csv','sl-phone-history.csv');
  }
  toast('History exported as '+fmt.toUpperCase(),'ok');
}

function setSetting(k,v){ State.settings[k]=v; persistSettings(); applyTheme();
  // re-render to reflect currency/view/density everywhere
  render();
}
function resetAllSettings(){ State.settings=Object.assign({},DEFAULT_SETTINGS); persistSettings(); applyTheme(); render(); toast('Settings reset to default','ok'); }

/* ---- presets capture the Filt object ---- */
function presetSummary(p){
  const f=p.filt; const parts=[];
  if(f.kw) parts.push('“'+f.kw+'”');
  if(f.brands.length) parts.push(f.brands.length+' brand(s)');
  if(f.sites.length) parts.push(f.sites.length+' site(s)');
  if(f.minP!=null||f.maxP!=null) parts.push('price range');
  if(f.discountedOnly) parts.push('discounted');
  parts.push('sort: '+f.sort);
  return parts.join(' · ');
}
function savePreset(){
  const name=prompt('Preset name:','My filter '+(State.presets.length+1));
  if(!name) return;
  State.presets.push({ name, filt:{
    kw:Filt.kw, brands:[...Filt.brands], sites:[...Filt.sites], ram:[...Filt.ram], storage:[...Filt.storage],
    os:[...Filt.os], chipset:[...Filt.chipset], years:[...Filt.years],
    minP:Filt.minP, maxP:Filt.maxP, minBat:Filt.minBat, maxBat:Filt.maxBat,
    discountedOnly:Filt.discountedOnly, changedOnly:Filt.changedOnly, sort:Filt.sort } });
  persistPresets(); render(); toast('Preset saved','ok');
}
function restorePreset(i){
  const f=State.presets[i].filt;
  Filt.kw=f.kw||''; Filt.brands=new Set(f.brands); Filt.sites=new Set(f.sites); Filt.ram=new Set(f.ram);
  Filt.storage=new Set(f.storage); Filt.os=new Set(f.os); Filt.chipset=new Set(f.chipset); Filt.years=new Set(f.years);
  Filt.minP=f.minP; Filt.maxP=f.maxP; Filt.minBat=f.minBat; Filt.maxBat=f.maxBat;
  Filt.discountedOnly=!!f.discountedOnly; Filt.changedOnly=!!f.changedOnly; Filt.sort=f.sort||'price-asc';
  toast('Preset “'+State.presets[i].name+'” applied','ok'); go('browse');
}
function deletePreset(i){ State.presets.splice(i,1); persistPresets(); render(); toast('Preset deleted','ok'); }

/* ===== app_init.js ===== */
/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  applyTheme();
  // overlay click closes drawer/modal
  const ov=document.getElementById('overlay');
  if(ov) ov.addEventListener('click',()=>{ closeModal(); closeDrawer(); });
  // escape closes
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeDrawer(); } });
  // react to system theme changes when in system mode
  if(window.matchMedia){ try{ window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',()=>{
    if(State.settings.theme==='system'){ applyTheme(); render(); } }); }catch(e){} }

  renderSidebar();
  render();
  loadLive(false);            // fetch the live Google-Sheets data on startup
}
if(typeof document!=='undefined'){
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
  else boot();
}
